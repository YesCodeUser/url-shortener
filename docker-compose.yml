services:
  app:
    build: .
    image: url-shortener
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env.docker
    ports:
      - "5432:5432"

volumes:
  pgdata: